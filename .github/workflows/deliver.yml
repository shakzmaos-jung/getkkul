name: deliver

# 다이제스트 발송 (ADR-0005). KST 07:30 / 11:30 / 17:30 / 21:30 = UTC 22:30 / 02:30 / 08:30 / 12:30.
# 트리거는 Supabase pg_cron(dispatch_deliver → workflow_dispatch) 단독. GitHub 네이티브 schedule 은
# pg_cron 과 동시 발화해 슬롯당 중복 발송을 유발하므로 제거했다(2026-07-17 인시던트). 슬롯당 1회 발송은
# scripts/deliver.ts 의 send_log 클레임(user,slot,day)이 보장하므로 어떤 트리거가 재발화해도 안전하다.
on:
  workflow_dispatch:
    inputs:
      force:
        description: '슬롯 시각창을 무시하고 강제 발송(테스트용)'
        type: boolean
        default: false

concurrency:
  group: deliver
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run delivery
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DELIVERY_FROM_EMAIL: ${{ secrets.DELIVERY_FROM_EMAIL }}
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
          DELIVER_FORCE: ${{ github.event.inputs.force }}
        run: npm run deliver
