name: pipeline

# 감지 → 전사 파이프라인 (ADR-0004).
# 주 트리거는 Supabase pg_cron(dispatch_pipeline, 20분 :07/:27/:47) → workflow_dispatch.
# GitHub 자체 크론은 지연·드롭이 잦아 백업으로만 매시 :37에 돈다(pg_cron/PAT 장애 대비).
on:
  schedule:
    - cron: '37 * * * *' # 백업(UTC; best-effort). 주 트리거는 pg_cron.
  workflow_dispatch:

# 동시 실행 방지 (겹치는 폴링으로 중복 처리 방지)
concurrency:
  group: pipeline
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Install yt-dlp & ffmpeg
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          yt-dlp --version

      # yt-dlp 가 YouTube n-challenge(nsig)를 풀려면 JS 런타임이 필요하다.
      - name: Install deno (yt-dlp JS challenge solver)
        run: |
          curl -fsSL https://deno.land/install.sh | sh -s -- -y
          echo "$HOME/.deno/bin" >> "$GITHUB_PATH"
          "$HOME/.deno/bin/deno" --version | head -1

      # 데이터센터 IP 봇차단 우회: 로그인 쿠키를 파일로 기록(비어있으면 무시)
      - name: Write YouTube cookies
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: printf '%s' "$YOUTUBE_COOKIES" > /tmp/yt-cookies.txt

      - name: Run pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          # 관리형 전사 폴백(REQ-C). 미설정이면 폴백 비활성(yt-dlp/Whisper만).
          SUPADATA_API_KEY: ${{ secrets.SUPADATA_API_KEY }}
          YTDLP_COOKIES_FILE: /tmp/yt-cookies.txt
          # 쿠키 만료 알림용(운영자 이메일 = GMAIL_USER, 발송도 Gmail)
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: npm run pipeline
