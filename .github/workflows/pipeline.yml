name: pipeline

# 감지 → 전사 파이프라인 (ADR-0004). 30분 스케줄 + 수동 실행.
on:
  schedule:
    - cron: '*/30 * * * *' # AC-C1.3 (UTC; best-effort)
  workflow_dispatch:

# 동시 실행 방지 (겹치는 폴링으로 중복 처리 방지)
concurrency:
  group: pipeline
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Install yt-dlp & ffmpeg
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          yt-dlp --version

      # yt-dlp 가 YouTube n-challenge(nsig)를 풀려면 JS 런타임이 필요하다.
      - name: Install deno (yt-dlp JS challenge solver)
        run: |
          curl -fsSL https://deno.land/install.sh | sh -s -- -y
          echo "$HOME/.deno/bin" >> "$GITHUB_PATH"
          "$HOME/.deno/bin/deno" --version | head -1

      # 데이터센터 IP 봇차단 우회: 로그인 쿠키를 파일로 기록(비어있으면 무시)
      - name: Write YouTube cookies
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: printf '%s' "$YOUTUBE_COOKIES" > /tmp/yt-cookies.txt

      - name: Run pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          YTDLP_COOKIES_FILE: /tmp/yt-cookies.txt
        run: npm run pipeline
