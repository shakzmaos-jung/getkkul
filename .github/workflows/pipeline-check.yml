name: pipeline-check

# 파이프라인 자동 점검·리포트 (ADR-0016). KST 08/10/12/14/16/18/20/22 = UTC 23/1/3/5/7/9/11/13.
# 정시성은 Supabase pg_cron(dispatch_pipeline_check)이 담당하고, 아래 GitHub 네이티브 크론은
# pg_cron 장애 대비 백업이다(지연 발화해도 리포트 성격이라 무해).
on:
  schedule:
    - cron: '0 23,1,3,5,7,9,11,13 * * *'
  workflow_dispatch:

concurrency:
  group: pipeline-check
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run pipeline health check
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DELIVERY_FROM_EMAIL: ${{ secrets.DELIVERY_FROM_EMAIL }}
          PIPELINE_CHECK_EMAIL: ${{ secrets.PIPELINE_CHECK_EMAIL }}
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
        run: npm run pipeline-check
